<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: radial-gradient(circle, #0a0a20 0%, #020205 100%); color: white; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .stats { display: flex; gap: 20px; padding: 20px; background: rgba(255,255,255,0.05); width: 100%; justify-content: center; border-bottom: 1px solid #333; }
        .stat-value { font-weight: bold; color: #00ff87; font-size: 18px; }
        .grid { display: grid; grid-template-columns: repeat(5, 65px); gap: 12px; padding: 20px; margin-top: auto; margin-bottom: auto; }
        .cell { width: 65px; height: 65px; border-radius: 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 255, 135, 0.2); transition: 0.3s; background-size: cover; background-position: center; }
        .cell.owned { border: 2px solid #00f2ff; box-shadow: 0 0 20px #00f2ff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="stats">
        <div><span class="stat-value" id="energy">100</span> ⚡ ЭНЕРГИЯ</div>
        <div><span class="stat-value" id="cells-count">0</span> 🌍 СЕКТОРЫ</div>
    </div>
    <div class="grid" id="map"></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user;
        let energy = 100;
        let ownedCells = 0;
        const map = document.getElementById('map');
        for (let i = 1; i <= 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.onclick = () => {
                if (!cell.classList.contains('owned') && energy >= 10) {
                    energy -= 10;
                    ownedCells++;
                    document.getElementById('energy').innerText = energy;
                    document.getElementById('cells-count').innerText = ownedCells;
                    cell.classList.add('owned');
                    if (user && user.photo_url) cell.style.backgroundImage = `url('${user.photo_url}')`;
                    tg.HapticFeedback.notificationOccurred('success');
                } else if (energy < 10) {
                    tg.showAlert("Энергия на нуле! Купи заряд в Арсенале.");
                }
            };
            map.appendChild(cell);
        }
   // Восстановление энергии: +5 единиц каждые 30 секунд
setInterval(() => {
    if (energy < 100) {
        energy = Math.min(100, energy + 5);
        document.getElementById('energy').innerText = energy;
    }
}, 30000); 
    </script>
</body>
</html>
