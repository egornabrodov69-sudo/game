<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; pointer-events: auto; }
        .btn { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.1); color: white; display: flex; align-items: center; justify-content: center; pointer-events: auto; border: 1px solid #fff; }
        #shoot-btn { bottom: 30px; right: 30px; width: 100px; height: 100px; background: rgba(255,0,0,0.3); font-size: 18px; }
        #inventory { position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 14px; text-shadow: 1px 1px #000; }
        #hp-bar { position: absolute; top: 10px; right: 10px; width: 150px; height: 12px; background: #300; border: 1px solid #fff; }
        #hp-fill { width: 100%; height: 100%; background: #f00; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="inventory">📦 ЗАПЧАСТИ: 0 | 🔫 AK-47</div>
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <div id="shoot-btn" class="btn">ОГОНЬ</div>
    </div>
    <div id="joystick"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.2); // Густой темный туман
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const flashlight = new THREE.SpotLight(0xffffff, 2, 20, 0.4);
        camera.add(flashlight); flashlight.target.position.set(0,0,-1); camera.add(flashlight.target);
        scene.add(camera);

        // ЗЕМЛЯ (Трава/Грязь)
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x111111}));
        ground.rotation.x = -Math.PI/2; scene.add(ground);

        // ДОМ (Стены)
        const wallMat = new THREE.MeshStandardMaterial({color: 0x222222});
        function addWall(x, z, w, h, ry=0) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.2), wallMat);
            wall.position.set(x, h/2, z); wall.rotation.y = ry; scene.add(wall);
        }
        addWall(0, -10, 8, 4); // Задняя стена дома
        addWall(-4, -6, 8, 4, Math.PI/2); // Левая
        addWall(4, -6, 8, 4, Math.PI/2); // Правая

        // ДЕРЕВЬЯ (Лес вокруг)
        for(let i=0; i<30; i++) {
            const tree = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 8), new THREE.MeshStandardMaterial({color: 0x050505}));
            tree.position.set(Math.random()*40-20, 4, Math.random()*40-20);
            if(tree.position.z > -2) scene.add(tree); 
        }

        // ЗОМБИ
        const zombie = new THREE.Group();
        zombie.add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.8, 0.4), new THREE.MeshStandardMaterial({color: 0x112211})));
        zombie.position.set(5, 0.9, -15); scene.add(zombie);

        camera.position.set(0, 1.6, 5);

        // Управление
        let mF = 0, mS = 0;
        const joy = nipplejs.create({ zone: document.getElementById('joystick'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'white' });
        joy.on('move', (e, d) => { mF = Math.sin(d.angle.radian) * d.distance/50; mS = Math.cos(d.angle.radian) * d.distance/50; });
        joy.on('end', () => { mF = 0; mS = 0; });

        document.getElementById('shoot-btn').ontouchstart = () => {
            flashlight.intensity = 15; setTimeout(() => flashlight.intensity = 2, 50);
            let ray = new THREE.Raycaster();
            ray.setFromCamera({x:0, y:0}, camera);
            if(ray.intersectObject(zombie, true).length > 0) zombie.position.z -= 2;
        };

        function animate() {
            requestAnimationFrame(animate);
            camera.translateZ(-mF * 0.1); camera.translateX(mS * 0.1);
            zombie.lookAt(camera.position.x, 0, camera.position.z);
            zombie.translateZ(0.04);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
