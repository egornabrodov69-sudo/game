<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; pointer-events: auto; }
        #hp-bar { position: absolute; top: 20px; right: 20px; width: 200px; height: 15px; background: #300; border: 2px solid #fff; }
        #hp-fill { width: 100%; height: 100%; background: #f00; }
        #status-text { position: absolute; top: 40px; right: 20px; color: #fff; font-size: 14px; text-shadow: 1px 1px #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <div id="status-text">Загрузка персонажа...</div>
    </div>
    <div id="joystick"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        // ПОЛУЧАЕМ СКИН ИЗ ССЫЛКИ
        const urlParams = new URLSearchParams(window.location.search);
        const userSkin = urlParams.get('skin') || 'male';
        const isAdmin = userSkin === 'admin';

        document.getElementById('status-text').innerText = `РЕЖИМ: ${userSkin.toUpperCase()}`;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.15);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ЦВЕТ ФОНАРИКА (У админа - синий/неоновый, у профи - белый)
        const lightColor = isAdmin ? 0x00ffff : 0xffffff;
        const flashlight = new THREE.SpotLight(lightColor, 2, 20, 0.4);
        camera.add(flashlight); flashlight.target.position.set(0,0,-1); camera.add(flashlight.target);
        scene.add(camera);

        // МАШИНА (Скин зависит от роли)
        const carColor = isAdmin ? 0xffd700 : 0x440000; // Золотая для админа
        const car = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshStandardMaterial({color: carColor}));
        car.position.set(0, 0.5, -5); scene.add(car);

        // ЗОМБИ
        const zombie = new THREE.Group();
        zombie.add(new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.4), new THREE.MeshStandardMaterial({color: 0x113311})));
        zombie.position.set(0, 0.9, -15); scene.add(zombie);

        camera.position.set(0, 1.6, 0);

        let mF = 0, mS = 0;
        const joy = nipplejs.create({ zone: document.getElementById('joystick'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'white' });
        joy.on('move', (e, d) => { mF = Math.sin(d.angle.radian) * d.distance/50; mS = Math.cos(d.angle.radian) * d.distance/50; });
        joy.on('end', () => { mF = 0; mS = 0; });

        // Вращение
        let tX = 0;
        window.addEventListener('touchstart', e => { if(e.touches[0].clientX > window.innerWidth/2) tX = e.touches[0].clientX; });
        window.addEventListener('touchmove', e => {
            if(e.touches[0].clientX > window.innerWidth/2) {
                camera.rotation.y -= (e.touches[0].clientX - tX) * 0.005;
                tX = e.touches[0].clientX;
            }
        });

        let hp = 100;
        function animate() {
            requestAnimationFrame(animate);
            camera.translateZ(-mF * 0.1); camera.translateX(mS * 0.1);
            
            zombie.lookAt(camera.position.x, 0, camera.position.z);
            zombie.translateZ(0.04);

            // ЛОГИКА АДМИНКИ: Если админ, урон не идет
            if(camera.position.distanceTo(zombie.position) < 1.5 && !isAdmin) {
                hp -= 0.5;
                document.getElementById('hp-fill').style.width = hp + "%";
            }

            if(hp <= 0) { alert("ВЫ ПОГИБЛИ"); location.reload(); }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
