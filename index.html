<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; pointer-events: auto; }
        .btn { position: absolute; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,0,0,0.3); 
               color: white; display: flex; align-items: center; justify-content: center; pointer-events: auto; border: 2px solid #fff; font-weight: bold; }
        #shoot-btn { bottom: 40px; right: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); }
        #reload-btn { bottom: 160px; right: 50px; width: 60px; height: 60px; font-size: 12px; }
        #weapon-ui { position: absolute; top: 20px; right: 20px; color: #ff0; text-shadow: 2px 2px #000; font-size: 18px; text-align: right; }
        #chat { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 12px; background: rgba(0,0,0,0.4); padding: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="weapon-ui">AK-47<br>ПАTРОНЫ: 30/∞</div>
        <div id="chat">ID СЕРВЕРА: #777<br>[Система]: Вы врезались в дерево.</div>
        <div id="shoot-btn" class="btn">ОГОНЬ</div>
        <div id="reload-btn" class="btn">RELOAD</div>
    </div>
    <div id="joystick"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.AmbientLight(0x404040, 0.5); scene.add(light);
        const flashlight = new THREE.SpotLight(0xffffff, 2, 20, 0.4, 0.5);
        camera.add(flashlight); flashlight.target.position.set(0, 0, -1); camera.add(flashlight.target);
        scene.add(camera);

        // Земля
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x111111}));
        ground.rotation.x = -Math.PI/2; scene.add(ground);

        // Машина и дерево
        const car = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshStandardMaterial({color: 0x550000}));
        car.position.set(0, 0.5, -5); car.rotation.y = 0.3; scene.add(car);
        const tree = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 10), new THREE.MeshStandardMaterial({color: 0x221100}));
        tree.position.set(1, 5, -6); scene.add(tree);

        // Зомби
        const zombie = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.5), new THREE.MeshStandardMaterial({color: 0x113311}));
        zombie.position.set(0, 0.9, -15); scene.add(zombie);

        camera.position.set(0, 1.6, 0);

        // Управление
        let moveF = 0, moveS = 0;
        const joy = nipplejs.create({ zone: document.getElementById('joystick'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'red' });
        joy.on('move', (e, d) => { moveF = Math.sin(d.angle.radian) * d.distance/50; moveS = Math.cos(d.angle.radian) * d.distance/50; });
        joy.on('end', () => { moveF = 0; moveS = 0; });

        let touchX = 0;
        window.addEventListener('touchstart', e => { if(e.touches[0].clientX > window.innerWidth/2) touchX = e.touches[0].clientX; });
        window.addEventListener('touchmove', e => {
            if(e.touches[0].clientX > window.innerWidth/2) {
                let dx = e.touches[0].clientX - touchX;
                camera.rotation.y -= dx * 0.005;
                touchX = e.touches[0].clientX;
            }
        });

        document.getElementById('shoot-btn').ontouchstart = () => {
            flashlight.intensity = 10;
            setTimeout(() => flashlight.intensity = 2, 50);
            // Тут логика попадания
        };

        function animate() {
            requestAnimationFrame(animate);
            camera.translateZ(-moveF * 0.1);
            camera.translateX(moveS * 0.1);
            zombie.position.z += 0.01; // Зомби медленно идет к игроку
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
