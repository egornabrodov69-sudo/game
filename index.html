<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Horror TWA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 10; }
        #look-area { position: absolute; top: 0; right: 0; width: 60%; height: 100%; z-index: 5; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="joystick-container"></div>
    <div id="look-area"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 15);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Пол с текстурой сетки (временно)
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0x050505 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Стены (коробка комнаты)
        const wallMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        for(let i=0; i<4; i++) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(20, 5, 0.5), wallMat);
            wall.position.y = 2.5;
            if(i==0) wall.position.z = -10;
            if(i==1) wall.position.z = 10;
            if(i==2) { wall.position.x = -10; wall.rotation.y = Math.PI/2; }
            if(i==3) { wall.position.x = 10; wall.rotation.y = Math.PI/2; }
            scene.add(wall);
        }

        // Свет (Фонарик)
        const flashLight = new THREE.SpotLight(0xffffff, 2, 15, Math.PI/6, 0.5);
        camera.add(flashLight);
        flashLight.position.set(0, 0, 0);
        flashLight.target.position.set(0, 0, -1);
        camera.add(flashLight.target);
        scene.add(camera);

        camera.position.set(0, 1.6, 0);

        // Управление движением
        let moveX = 0, moveZ = 0;
        const joystick = nipplejs.create({ zone: document.getElementById('joystick-container'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'red' });
        joystick.on('move', (e, data) => {
            const speed = 0.1;
            moveX = Math.cos(data.angle.radian) * data.distance / 50 * speed;
            moveZ = Math.sin(data.angle.radian) * data.distance / 50 * speed;
        });
        joystick.on('end', () => { moveX = 0; moveZ = 0; });

        // Управление камерой (вращение пальцем по правой части экрана)
        let lon = 0, lat = 0;
        document.getElementById('look-area').addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            lon -= (touch.force || 1) * 2; // Упрощенная логика вращения
        });

        function animate() {
            requestAnimationFrame(animate);
            camera.translateX(moveX);
            camera.translateZ(-moveZ);
            camera.rotation.y += moveX * 0.1; // Легкий поворот при ходьбе
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
