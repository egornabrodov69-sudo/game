<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #joystick { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; pointer-events: auto; }
        .btn { position: absolute; border-radius: 50%; background: rgba(255,0,0,0.3); color: white; display: flex; align-items: center; justify-content: center; pointer-events: auto; border: 2px solid #fff; font-weight: bold; }
        #shoot-btn { bottom: 40px; right: 40px; width: 100px; height: 100px; }
        #craft-btn { top: 20px; left: 50%; transform: translateX(-50%); width: 120px; height: 40px; border-radius: 5px; }
        #hp-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 20px; background: #330000; border: 2px solid white; pointer-events: none; }
        #hp-fill { width: 100%; height: 100%; background: red; transition: 0.3s; }
        #blood { position: absolute; width: 100%; height: 100%; background: rgba(255,0,0,0); pointer-events: none; transition: 0.5s; }
    </style>
</head>
<body>
    <div id="blood"></div>
    <div id="ui">
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <div id="craft-btn" class="btn" onclick="openCraft()">КРАФТ (📦0)</div>
        <div id="shoot-btn" class="btn">ОГОНЬ</div>
    </div>
    <div id="joystick"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        let hp = 100;
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.15);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const flashlight = new THREE.SpotLight(0xffffff, 2, 20, 0.4);
        camera.add(flashlight); flashlight.target.position.set(0,0,-1); camera.add(flashlight.target);
        scene.add(camera);

        // Земля и Окружение
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(500,500), new THREE.MeshStandardMaterial({color:0x111111})).rotateX(-Math.PI/2));
        
        // Машина (сборная)
        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.2, 4), new THREE.MeshStandardMaterial({color: 0x440000}));
        car.add(body);
        car.position.set(0, 0.6, -5); scene.add(car);

        // ЗОМБИ (с руками)
        const zombie = new THREE.Group();
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0x224422}));
        head.position.y = 1.6; zombie.add(head);
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.3), new THREE.MeshStandardMaterial({color: 0x113311}));
        torso.position.y = 0.9; zombie.add(torso);
        zombie.position.set(0, 0, -15);
        scene.add(zombie);

        camera.position.set(0, 1.6, 0);

        // Управление
        let moveF = 0, moveS = 0;
        const joy = nipplejs.create({ zone: document.getElementById('joystick'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'white' });
        joy.on('move', (e, d) => { moveF = Math.sin(d.angle.radian) * d.distance/50; moveS = Math.cos(d.angle.radian) * d.distance/50; });
        joy.on('end', () => { moveF = 0; moveS = 0; });

        function openCraft() { alert("Нужен металлолом! Обыщи машину."); }

        document.getElementById('shoot-btn').ontouchstart = () => {
            flashlight.intensity = 15; setTimeout(() => flashlight.intensity = 2, 70);
            // Проверка попадания в зомби
            if(camera.position.distanceTo(zombie.position) < 10) {
                zombie.position.z -= 1; // Отлетает при попадании
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            camera.translateZ(-moveF * 0.08);
            camera.translateX(moveS * 0.08);

            // Логика зомби: идет к игроку
            const dist = camera.position.distanceTo(zombie.position);
            if(dist > 1) {
                zombie.lookAt(camera.position.x, 0, camera.position.z);
                zombie.translateZ(0.03);
            } else {
                // Атака зомби
                hp -= 0.5;
                document.getElementById('hp-fill').style.width = hp + "%";
                document.getElementById('blood').style.background = "rgba(255,0,0,0.3)";
                setTimeout(() => document.getElementById('blood').style.background = "rgba(255,0,0,0)", 100);
            }

            if(hp <= 0) { alert("ТЫ ПОГИБ"); hp = 100; camera.position.set(0, 1.6, 0); }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
